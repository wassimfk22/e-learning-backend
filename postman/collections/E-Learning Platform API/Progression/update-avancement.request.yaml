$kind: http-request
name: 'Update Avancement'
method: PATCH
url: '{{baseUrl}}/api/progression/:id/avancement'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "pourcentage": 45.5
    }
