$kind: http-request
name: 'Update Module'
method: PUT
url: '{{baseUrl}}/api/modules/:id'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "titre": "Spring Boot Avancé",
      "description": "Concepts avancés",
      "duree": 25
    }
