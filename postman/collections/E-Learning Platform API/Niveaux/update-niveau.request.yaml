$kind: http-request
name: 'Update Niveau'
method: PUT
url: '{{baseUrl}}/api/niveaux/:id'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nom": "Licence 3",
      "filiere": "Informatique",
      "annee": "2025-2026"
    }
