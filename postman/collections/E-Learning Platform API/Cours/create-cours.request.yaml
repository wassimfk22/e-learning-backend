$kind: http-request
name: 'Create Cours'
method: POST
url: '{{baseUrl}}/api/cours'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "titre": "Introduction à Java",
      "moduleId": 1
    }
