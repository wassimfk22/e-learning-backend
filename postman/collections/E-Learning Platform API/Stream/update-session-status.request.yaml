$kind: http-request
name: 'Update Session Status'
method: PATCH
url: '{{baseUrl}}/api/stream/sessions/:id/status'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "EN_COURS"
    }
